# Version and release the monorepo's publishable packages to npm via Rush native
# publish and npm OIDC trusted publishing.
#
# The workflow is intentionally Rush-native:
#   - on a push to main that introduced new Rush change files, this workflow
#     runs `rush publish --apply` to consume them into package.json and
#     CHANGELOG updates, then commits that version bump back to main.
#   - the publish job then checks out main after the version-bump commit and
#     runs `rush publish --include-all --publish` so Rush compares every
#     shouldPublish=true project against npm and invokes pnpm publish only for
#     versions that are not already published.
#
# Do not replace this with raw `npm publish` from a package directory: npm does
# not rewrite pnpm `workspace:` dependencies. Rush invokes pnpm publish, and
# pnpm creates the publish manifest/tarball with workspace protocol dependencies
# rewritten to registry-installable versions before the final upload.
#
# OIDC trusted publishing still comes from npm 11.5.1+. Rush 5.140 does not have
# a `--provenance` flag, but it runs pnpm, and pnpm ultimately shells out to
# `npm publish`. Setting NPM_CONFIG_PROVENANCE=true on the Rush step is inherited
# by that final npm process, where npm exchanges the GitHub Actions id-token for
# a short-lived publish token. There is no long-lived NODE_AUTH_TOKEN / NPM_TOKEN.
#
# Each publishable package must already have an npm trusted-publisher entry:
#   Provider:   GitHub Actions
#   Owner:      excitedjs
#   Repository: excitedjs/dreamux
#   Workflow:   release.yml
#   Environment: (leave blank unless the job below is put in an environment)
# New packages that have never existed on npm still need a one-time bootstrap
# before setting shouldPublish=true, because npm package settings only exist
# after the package has been created.
#
# Manual dispatch against main is a retry hook for stable only; stable npm
# publishes must not come from feature branches.
#
# When a version bump is needed, the release job pushes the generated
# package.json / CHANGELOG commit back to main with the workflow GITHUB_TOKEN.
# This repository's main protection must continue to allow that bot push, or a
# future stricter protection rule must grant github-actions[bot] a bypass.
#
# Prerelease channels reuse this same file (and therefore the same npm
# trusted-publisher entry, Workflow: release.yml). Manual dispatch against
# `next` publishes `beta`; dispatch against any other non-main branch publishes
# `alpha`. Stable version/publish jobs are gated to main and never run on
# prerelease branches. Prerelease publishes never move `latest`. They are
# ephemeral: an in-tree prerelease version is applied, built, packed, audited,
# and published, but commits and pushes NOTHING back. Prerelease apply does NOT
# delete pending Rush change files, so a later stable release still consumes
# them. Beta uses `beta.<github.run_number>`; alpha uses `alpha.<short_sha>` so
# branch builds are tied to source.

name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  version:
    name: apply rush change files and push version bump
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      should_publish: ${{ steps.version.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Apply pending change files (rush)
        id: version
        env:
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Push-triggered releases run whenever main has pending Rush change
          # files. This covers the normal merge path and lets a later workflow
          # repair retry a release that previously failed after the change files
          # had already landed. The bot's own version-bump commit deletes those
          # files and contains [skip ci], so it cannot loop.
          if [ "$EVENT" = push ]; then
            pending="$(find common/changes -type f -name '*.json' -print -quit 2>/dev/null || true)"
            if [ -z "$pending" ]; then
              echo 'No pending Rush change files on main; skipping.'
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          node common/scripts/install-run-rush.js install
          # --apply consumes common/changes/*.json into package.json + CHANGELOG
          # bumps. No --publish here: the separate publish job owns registry I/O.
          node common/scripts/install-run-rush.js publish --apply

          if [ -z "$(git status --porcelain -- packages common/changes)" ]; then
            echo 'No version artifacts changed.'
            if [ "$EVENT" = workflow_dispatch ]; then
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Push version bump
        if: steps.version.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add packages common/changes
          git commit -m "chore(release): version packages [skip ci]"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:"${GITHUB_REF_NAME}"

  publish:
    name: rush publish changed packages to npm (OIDC)
    needs: version
    if: needs.version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    # Optional hardening: run the publish in a protected GitHub Environment with
    # required reviewers. If enabled, set the same environment in each package's
    # npm trusted-publisher settings.
    # environment: npm-publish
    steps:
      - uses: actions/checkout@v4
        with:
          # The version job has already pushed the version-bump commit. Checking
          # out the branch name, not github.sha, gets the package.json versions
          # that should be published.
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upgrade npm for OIDC trusted publishing
        # Node 22 currently ships npm 10.x; tokenless trusted publishing needs
        # npm 11.5.1+ so the final npm publish process can exchange the GitHub
        # OIDC id-token for a short-lived npm publish token.
        run: npm install -g npm@11.5.1

      - name: Build (rush, monorepo-aware)
        run: |
          node common/scripts/install-run-rush.js install
          node common/scripts/install-run-rush.js build
          node common/scripts/install-run-rush.js smoke-built-cli

      - name: Publish changed packages (rush native)
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          node common/scripts/install-run-rush.js publish \
            --include-all \
            --publish \
            --set-access-level public \
            --registry https://registry.npmjs.org

  prerelease:
    name: publish prerelease to npm beta/alpha dist-tag (OIDC)
    # This job is reachable solely via workflow_dispatch, because `on.push`
    # listens only to main. Dispatching against main runs stable jobs and skips
    # this one. Dispatching against next publishes beta. Dispatching against any
    # other branch publishes alpha. Gate on full refs so a tag named next/main
    # can never satisfy the branch policy.
    if: github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/heads/') && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Upgrade npm for OIDC trusted publishing
        # Same requirement as the stable publish job: tokenless trusted
        # publishing needs npm 11.5.1+ so the final npm process can exchange
        # the GitHub OIDC id-token for a short-lived publish token.
        run: npm install -g npm@11.5.1

      - name: Build (rush, monorepo-aware)
        run: |
          node common/scripts/install-run-rush.js install
          node common/scripts/install-run-rush.js build
          node common/scripts/install-run-rush.js smoke-built-cli

      - name: Select prerelease channel
        id: channel
        run: |
          set -euo pipefail
          if [ "$GITHUB_REF" = "refs/heads/next" ]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=beta.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            short_sha="$(git rev-parse --short=12 HEAD)"
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
            echo "prerelease=alpha.g${short_sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply prerelease version (ephemeral, never committed)
        # --partial-prerelease bumps only packages that have pending change
        # files (e.g. 0.12.0 -> 0.12.1-alpha.g<sha>); packages without changes
        # stay at their published version and the publish step skips them.
        # Unlike a stable `rush publish --apply`, prerelease apply does NOT
        # delete the change files, so the eventual stable release on main still
        # sees them. This working tree is throwaway CI state: NOTHING is
        # committed/pushed.
        run: |
          set -euo pipefail
          node common/scripts/install-run-rush.js publish \
            --apply \
            --partial-prerelease \
            --prerelease-name "${{ steps.channel.outputs.prerelease }}"
          echo "Resulting package versions:"
          git --no-pager diff -- '*/package.json' | grep -E '^\+.*"version"' || \
            echo "  (no package had pending change files; nothing to prerelease)"

      - name: Pack and verify manifest (no registry upload)
        # IMPORTANT: `rush publish --pack` is a no-op under Rush's default
        # read-only mode — it only prints `DRYRUN: pnpm pack` and writes nothing.
        # Real tarballs are produced only with `--publish`, where `--pack` still
        # suppresses the registry upload (and, without --apply-git-tags-on-pack,
        # applies no git tags). So we pack with --include-all --publish --pack
        # into a release folder, then audit every tarball BEFORE the real
        # publish step uploads anything. --include-all packs every
        # shouldPublish=true package (dreamux + feishu-transport), so the audit
        # always has artifacts; zero tarballs means pack failed -> fail hard.
        run: |
          set -euo pipefail
          rm -rf common/temp/prerelease-tarballs
          node common/scripts/install-run-rush.js publish \
            --include-all \
            --publish \
            --pack \
            --release-folder common/temp/prerelease-tarballs
          shopt -s nullglob
          tarballs=(common/temp/prerelease-tarballs/*.tgz)
          if [ ${#tarballs[@]} -eq 0 ]; then
            echo "Expected packed tarballs under common/temp/prerelease-tarballs but found none." >&2
            echo "A manifest gate that scans nothing is not a gate; aborting before publish." >&2
            exit 1
          fi
          fail=0
          for tgz in "${tarballs[@]}"; do
            echo "== $tgz =="
            listing="$(tar tzf "$tgz")"
            printf '%s\n' "$listing"
            # Existence check via a here-string, NOT `tar tzf | grep -q`: under
            # `set -o pipefail`, grep -q exits on the first match, the upstream
            # tar takes SIGPIPE and exits 141, and pipefail propagates 141 —
            # false-failing this check as "missing package.json" purely on pipe
            # timing. A here-string has no upstream process to signal.
            if ! grep -qxF 'package/package.json' <<<"$listing"; then
              echo "Tarball $tgz is missing package.json" >&2
              fail=1
            fi
            # Public-repo red line: a published artifact must not carry internal
            # Feishu identifiers, the internal /data00 mount, or an absolute
            # builder/developer home path. `/home/volta/` is an intentional
            # PUBLIC example in onboard/service.ts (it documents Volta's home
            # layout and is compiled into dist), so that exact token is
            # allow-listed; any other /home/<user>/ is treated as a leaked path.
            # Extend the allow-list (grep -vxE alternation) only with reviewed,
            # provably-public example paths.
            leaks="$(
              tar xzO -f "$tgz" 2>/dev/null \
                | grep -aoE '(ou_[A-Za-z0-9]{20}|oc_[A-Za-z0-9]{20}|cli_[A-Za-z0-9]{16}|/data00/|/home/[a-z][a-z0-9_-]+/)' \
                | grep -vxE '/home/volta/' \
                | sort -u || true
            )"
            if [ -n "$leaks" ]; then
              echo "FORBIDDEN internal content in $tgz:" >&2
              printf '  %s\n' "$leaks" >&2
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] || { echo "Manifest verification failed; aborting before publish." >&2; exit 1; }

      - name: Publish prerelease to npm dist-tag (rush native, OIDC)
        # Same proven stable invocation, plus the selected tag: rush invokes
        # `pnpm publish --tag <tag>`, pnpm rewrites workspace:* deps to registry
        # versions, and npm uploads to the prerelease dist-tag — `latest` is
        # never touched. --include-all republishes only versions newer than what
        # npm already has. --registry suppresses git tagging.
        env:
          NPM_CONFIG_PROVENANCE: 'true'
        run: |
          node common/scripts/install-run-rush.js publish \
            --include-all \
            --publish \
            --tag "${{ steps.channel.outputs.tag }}" \
            --set-access-level public \
            --registry https://registry.npmjs.org

      - name: Print install-verify hint
        run: |
          echo "Prerelease published to the '${{ steps.channel.outputs.tag }}' dist-tag."
          echo "Verify with: npm install @excitedjs/dreamux@${{ steps.channel.outputs.tag }}"
          echo "Inspect tags: npm dist-tag ls @excitedjs/dreamux"
